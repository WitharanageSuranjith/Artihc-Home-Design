<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>
</head>

<body>

<form class="contact-form" onsubmit="handleSubmit(event)">

  <div class="form-group">
    <label>First Name</label>
    <input type="text" name="firstName" placeholder="John" required />
  </div>

  <div class="form-group">
    <label>Last Name</label>
    <input type="text" name="lastName" placeholder="Doe" required />
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" name="email" placeholder="john@example.com" required />
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" name="phone" placeholder="+94 77 123 4567" />
  </div>

  <div class="form-group full">
    <label>Service Interested In</label>
    <select name="service" required>
      <option value="">Select a service...</option>
      <option>Architecture Design</option>
      <option>Environment & Concept Design</option>
      <option>Landscapes & Street</option>
    </select>
  </div>

  <div class="form-group full">
    <label>Your Message</label>
    <textarea name="message" placeholder="Tell us about your project..." required></textarea>
  </div>

  <div class="form-submit">
    <button type="submit" style="width:100%;padding:12px;background:#c8a24c;color:#000;border:none;">
      Send Message
    </button>
  </div>

</form>

<script>
function handleSubmit(event) {
    event.preventDefault();

    let form = event.target;

    let firstName = form.firstName.value.trim();
    let lastName = form.lastName.value.trim();
    let email = form.email.value.trim();
    let phone = form.phone.value.trim();
    let service = form.service.value;
    let message = form.message.value.trim();

    // Optional validation
    if (!firstName || !lastName || !email || !service || !message) {
        alert("Please fill all required fields");
        return;
    }

    let text = `Name: ${firstName} ${lastName}
Email: ${email}
Phone: ${phone}
Service: ${service}
Message: ${message}`;

    let whatsappNumber = "+94741270675"; // 🔥 your WhatsApp number (no +)

    let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`;

    window.open(url, "_blank");

    // Optional: reset form after click
    form.reset();
}
</script>

</body>
</html>
